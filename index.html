<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>끝말잇기 웹게임</title>
    <meta name="description" content="봇과 대결하는 한국어 끝말잇기 웹게임입니다. 제한 시간 안에 단어를 이어가며 미션 글자와 한방 단어로 점수를 겨뤄보세요.">
    <meta name="keywords" content="끝말잇기, 끝말잇기 게임, 한국어 게임, 단어 게임, 웹게임">
    <meta name="robots" content="index, follow">
        <link rel="canonical" href="https://siwonyang918.github.io/word-chain-game/">
<meta property="og:title" content="끝말잇기 웹게임">
    <meta property="og:description" content="봇과 대결하는 한국어 끝말잇기 웹게임입니다.">
    <meta property="og:type" content="website">
        <meta property="og:url" content="https://siwonyang918.github.io/word-chain-game/">
<meta name="twitter:card" content="summary">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header id="game-header">
            <div class="header-row">
                <div class="info-box">🎯 점수: <span id="score-display">0</span>점</div>
                <div class="info-box">⏱️ 남은 시간: <span id="time-display">10</span>초</div>
            </div>
            <div class="header-row">
                <div class="info-box">⭐ 미션 글자: <span id="mission-display">-</span></div>
                <div class="info-box">
                    🤖 난이도: 
                    <select id="difficulty-select">
                        <option value="easy">쉬움</option>
                        <option value="normal" selected>보통</option>
                        <option value="hard">어려움</option>
                        <option value="expert">전문가</option>
                    </select>
                </div>
            </div>
            <button id="start-btn">게임 시작</button>
        </header>

        <main id="chat-window">
            <div class="system-message">난이도를 선택하고 게임 시작 버튼을 눌러주세요!</div>
        </main>

        <footer id="input-container">
            <input type="text" id="word-input" placeholder="단어를 입력하세요..." disabled>
            <button id="send-btn" disabled>전송</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
